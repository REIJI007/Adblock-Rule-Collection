name: Generate Block Domain List

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  filter-rules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytz

      - name: Process AdBlock rules
        run: |
          python3 << 'EOF'
          import datetime
          import pytz
          import re

          dns_domain_regex = re.compile(
              r'^(?!-)[A-Za-z0-9-]{1,63}(?<!-)(\.[A-Za-z0-9-]{1,63})*\.[A-Za-z]{2,}$'
          )

          def is_blocked_by_badfilter(domain, badfilters):
              # 命中条件：
              # 1) domain 本身就是 badfilter 域名
              # 2) domain 是 badfilter 域名的子域
              return any(
                  domain == bf or domain.endswith("." + bf)
                  for bf in badfilters
              )

          def process_file(input_file, output_file, title):
              with open(input_file, 'r', encoding='utf-8') as f:
                  blocks = set()
                  badfilters = set()

                  for line in f:
                      line = line.strip()

                      if not line or line.startswith(('!', '#')):
                          continue

                      line = line.lower()

                      # 识别 ||domain^$badfilter 或 ||domain^$badfilter,...
                      bad_match = re.match(
                          r'^\|\|([a-z0-9.-]+)\^.*\$badfilter(?:$|,)',
                          line
                      )
                      if bad_match:
                          domain = bad_match.group(1)
                          if dns_domain_regex.match(domain):
                              badfilters.add(domain)
                          continue

                      # 仅识别纯拦截规则 ||domain^
                      match = re.match(r'^\|\|([a-z0-9.-]+)\^$', line)
                      if match:
                          domain = match.group(1)
                          if not re.match(r'^\d+\.\d+\.\d+\.\d+$', domain) and dns_domain_regex.match(domain):
                              blocks.add(domain)

              # 核心逻辑：排除所有被 badfilter 命中的域名及其子域
              domains = sorted(
                  d for d in blocks
                  if not is_blocked_by_badfilter(d, badfilters)
              )

              tz = pytz.timezone('Asia/Shanghai')
              timestamp = datetime.datetime.now(tz).strftime('%Y-%m-%d %H:%M:%S')

              header = f"""
          #Title: {title}
          #Description: 一个汇总了多个广告过滤器过滤规则的拦截域名列表，每20分钟更新一次，确保即时同步上游减少误杀
          #Homepage: https://github.com/REIJI007/Adblock-Rule-Collection
          #LICENSE1: https://github.com/REIJI007/Adblock-Rule-Collection/blob/main/LICENSE-GPL 3.0
          #LICENSE2: https://github.com/REIJI007/Adblock-Rule-Collection/blob/main/LICENSE-CC-BY-NC-SA 4.0
          #生成时间: {timestamp}
          #有效域名数目: {len(domains)}
          """

              with open(output_file, 'w', encoding='utf-8') as f:
                  f.write(header + '\n')
                  f.write('\n'.join(domains) + '\n')

              print(f"Processed {input_file}. Total domains: {len(domains)} (after removing {len(badfilters)} badfilter domains)")

          process_file('ADBLOCK_RULE_COLLECTION.txt', 'ADBLOCK_RULE_COLLECTION_DOMAIN.txt', 'Adblock-Rule-Collection-Domain')
          process_file('ADBLOCK_RULE_COLLECTION_Lite.txt', 'ADBLOCK_RULE_COLLECTION_DOMAIN_Lite.txt', 'Adblock-Rule-Collection-Domain-Lite')
          EOF

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add -A

          attempt=0
          max_attempts=5
          success=false

          git fetch origin main
          git merge origin/main --strategy-option=ours || git merge --abort || echo "Merge conflicts resolved automatically using 'ours' strategy."

          while [ $attempt -lt $max_attempts ]; do
              git commit -m "Update AdBlock Domain rules" && success=true && break
              attempt=$((attempt + 1))
              echo "Commit failed, retrying in 10 seconds... (Attempt $attempt of $max_attempts)"
              sleep 10
          done

          if [ "$success" = true ]; then
              attempt=0
              success=false

              while [ $attempt -lt $max_attempts ]; do
                  git push origin main && success=true && break
                  attempt=$((attempt + 1))
                  echo "Push failed, retrying in 10 seconds... (Attempt $attempt of $max_attempts)"
                  sleep 10
              done

              if [ "$success" = false ]; then
                  echo "Push failed after $max_attempts attempts. Continuing workflow."
              else
                  echo "Push successful."
              fi
          else
              echo "Commit failed after $max_attempts attempts. Continuing workflow."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
